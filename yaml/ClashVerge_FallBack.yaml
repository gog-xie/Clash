# 使用说明
# 本yaml配置模板适配于Clash Verge，输入机场订阅地址和机场名称即可导入Clash Verge；
# FallBack模式下，手动刷新时不能自动转移是正常现象，按程序给定的时间间隔自动刷新后会自动故障转移；
# 涉及类似filter: "^((?!(建议|0.1X)).)*$"的语句行，是将自己不需要的机场节点排除掉，通常都是限速节点，需根据机场节点情况自行排除，输入关键字即可，每个关键字用“|”隔开；  
# 根据在用机场节点定制的yaml配置文件，比如机场有AI、流媒体解锁等专项节点，故本订阅节点加入了“流媒体”、“GPT”策略组，不需要的可删除，但要删干净，特别是策略组中的节点，否则报错；
# 机场节点地区分类仅分了香港、美国、新加坡、日本、韩国、加拿大和其他地区，如果你的机场某个地区节点比较多，可以参照业务分流组新增地区分类；
# 根据自己使用习惯，策略组已将默认节点策略组放置在最前，便于每次更新订阅均不需重新选择策略组节点，可根据自己的情况对策略组的顺序做相应调整；
# 规则组可根据自己的使用情况自行定制rules，比如加入自己经常使用的直连和需代理的域名或IP，加在现有rules的最前面，其他最好不要改动现有顺序，否则可能会影响使用效果。


# ========================
# 机场订阅
# ========================
proxy-providers:

  机场名称（自定义）:
    url: https://机场订阅地址&flag=meta  #修改你的机场A订阅地址，根据节点解析情况确定是否保留&flag=meta结尾
    type: http
    interval: 86400
    filter: "^((?!(报错|特殊|测试|如果|导致|教程|更新一下|0.1x)).)*$"
    override:
      skip-cert-verify: true
      udp: true
#      additional-prefix: "[test]" # 为节点名添加前缀
#      additional-suffix: "[test]"  # 为节点名添加后缀
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: Direct

# ————————————————————————
# 代理策略组
# ————————————————————————

proxy-groups:                                  # 策略组配置开始
  - name: 手动选择                              # 策略组名称：手动选择
    icon: "https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Static.png"  # 策略组显示图标地址
    type: select                               # 策略组类型：手动选择模式
    url: https://www.gstatic.com/generate_204   # 延迟测试使用的检测地址
    interval: 300                              # 延迟测试间隔（秒）
    include-all: true                          # 自动包含所有节点
    proxies:                                   # 手动指定节点列表
      - 全部自动
      - 全球直连
      - 香港-故转
      - 美国-故转
      - 日本-故转
      - 新加坡-故转
      - 台湾-故转
      - GPT-故转
      - 流媒体-故转
      - 其他-故转
      - 香港-自动
      - 美国-自动
      - 日本-自动
      - 台湾-自动
      - 新加坡-自动
      - 流媒体-自动
      - GPT-自动
      - 其他-自动
    filter: "^((?!(报错|特殊|测试|如果|导致|教程|更新一下|0.1x)).)*$" # 节点名称正则过滤规则

  - name: 全部自动
    icon: "https://testingcf.jsdelivr.net/gh/Lanlan13-14/Rules@main/icon/automation2.png"
    type: url-test                           # 策略组类型：自动选择模式
    url: https://www.gstatic.com/generate_204
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(报错|特殊|测试|如果|导致|教程|更新一下|0.1x)).)*$"

