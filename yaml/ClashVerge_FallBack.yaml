rules:

#  内网设备192.168.50.88走直连，设备192.168.50.98的部分域名（My_Proxy）走代理，其余直连（本小节为特殊需求，根据个人情况修订，不需要的注释掉即可）。
#  ———————————————————————
  - SRC-IP-CIDR,192.168.50.88/32,DIRECT,no-resolve
