# ————————————————————————
# 机场订阅（支持多个机场订阅）
# ————————————————————————

proxy-providers:
  Airport1:
    url: https://xxxxxxxxxx&flag=meta  #输入你的机场1订阅链接地址，根据自己机场情况是否加上&flag=meta结尾，否则会过滤掉某些节点
    type: http
    interval: 86400
    filter: "^((?!(报错|特殊|测试|如果|导致|教程|更新一下|0.1x)).)*$"
    override:
      skip-cert-verify: true
      udp: true
#      additional-prefix: "[test]" # 为节点名添加前缀
#      additional-suffix: "[test]" # 为节点名添加后缀
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: Direct
  
  Airport2:
    url: https://xxxxxxxxxx&flag=meta
    type: http
    interval: 86400
    filter: "^((?!(报错|特殊|测试|如果|导致|教程|更新一下|0.1x)).)*$"
    override:
      skip-cert-verify: true
      udp: true
#      additional-prefix: "[test]" # 为节点名添加前缀
#      additional-suffix: "[test]" # 为节点名添加后缀
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: Direct

  Airport3:
    url: https://xxxxxxxxxx&flag=meta
    type: http
    interval: 86400
    filter: "^((?!(报错|特殊|测试|如果|导致|教程|更新一下|0.1x)).)*$"
    override:
      skip-cert-verify: true
      udp: true
#      additional-prefix: "[test]" # 为节点名添加前缀
#      additional-suffix: "[test]" # 为节点名添加后缀
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: Direct

# ————————————————————————
# 全局配置 
# ————————————————————————
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# ————————————————————————
# 嗅探
# ————————————————————————
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# ————————————————————————
# 入站
# ————————————————————————
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# ————————————————————————
# DNS模块
# ————————————————————————
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

# ========================
# 数据库
# ========================

geox-url:
  mmdb: https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/Country.mmdb
  geoip: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb
geo-auto-update: true 
geo-update-interval: 24 
geodata-mode: true

