# 使用说明
# 本yaml配置模板适配于MerlinClash，输入机场订阅地址和机场名称即可导入MerlinClash；（需修订文件名，小于15字符）
# 涉及类似filter: "^((?!(建议|0.1X)).)*$"的语句行，是将自己不需要的机场节点排除掉，通常都是限速节点，需根据机场节点情况自行排除，输入关键字即可，每个关键字用“|”隔开；  
# 根据在用机场节点定制的yaml配置文件，比如机场有AI、流媒体解锁等专项节点，故本订阅节点加入了“流媒体”、“GPT”策略组，不需要的可删除，但要删干净，特别是策略组中的节点，否则报错；
# 机场节点地区分类仅分了香港、美国、新加坡、日本、韩国、加拿大和其他地区，如果你的机场某个地区节点比较多，可以参照业务分流组新增地区分类；
# 根据自己使用习惯，策略组已将默认节点策略组放置在最前，便于每次更新订阅均不需重新选择策略组节点，可根据自己的情况对策略组的顺序做相应调整；
# 在规则组中写有部分设备不代理，或部分设备指定域名走代理，其余直连的规则，根据个人情况修订或删除；
# 规则组可根据自己的使用情况自行定制rules，比如加入自己经常使用的直连和需代理的域名或IP，加在现有rules的最前面，其他最好不要改动现有顺序，否则可能会影响使用效果。


# ========================
# 机场订阅（可多个机场）
# ========================
proxies:
proxy-providers:
  Airport1:
    type: http
    url: https://xxxxxxxxxx&flag=meta  #若无法订阅节点，试试在你的机场A订阅地址最后添加&flag=meta结尾
    interval: 86400
    filter: "^((?!(建议|如果|教程|客户端|0.1x|x0.1)).)*$" 
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "[Airport1]"
    proxy: 直连
      
  Airport2:
    type: http
    url: https://xxxxxxxxxx&flag=meta  #若无法订阅节点，试试在你的机场A订阅地址最后添加&flag=meta结尾
    interval: 86400
    filter: "^((?!(建议|如果|教程|客户端|0.1x|x0.1)).)*$"
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "[Airport2]"
    proxy: 直连   

proxies:
  - {name: 直连, type: direct}

# ======================== 
#全局基础配置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true      # 统一显示 TCP 延迟
tcp-concurrent: true     # 开启并发提升网页加载速度
log-level: warning       # 减少日志频率，保护路由器 Flash 寿命
find-process-mode: 'off'
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

# ========================
#流量嗅探
# ========================
sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: false}
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# ========================
#入站设置 (由 MC 插件脚本处理路由逻辑)
# ========================
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# ========================
#DNS 模块 (针对 MC 插件 Fake-IP 模式深度优化)
# ========================
dns:
  enable: true
  listen: :23453        # 适配 MC 插件默认监听端口
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16 # 适配插件默认 Fake-IP 段
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.router.asus.com" # 确保梅林/华硕后台访问正常
    - "rule-set:private_domain,cn_domain"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
  default-nameserver: [223.5.5.5, 119.29.29.29]
  proxy-server-nameserver: [119.29.29.29]
  nameserver: [223.5.5.5, 119.29.29.29, 180.76.76.76]

