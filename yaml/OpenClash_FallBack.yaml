# 使用说明
# 本yaml配置模板适配于OpenClash，输入机场订阅地址和机场名称即可导入OpenClash；
# 本模版为FallBack模式，由于在FallBack模式下大部分时间都选择在手动节点上，故采用Smart模式的必要性并不大，可关闭Smart模式（覆写设置→Smart设置→Smart策略自动切换→取消勾选），采用Mate内核（插件设置→版本更新→Smate内核→停用）；
# FallBack模式下，手动刷新时不能自动转移是正常现象，按程序给定的时间间隔自动刷新后会自动故障转移；
# 涉及类似filter: "^((?!(建议|0.1X)).)*$"的语句行，是将自己不需要的机场节点排除掉，通常都是限速节点，需根据机场节点情况自行排除，输入关键字即可，每个关键字用“|”隔开；  
# 根据在用机场节点定制的yaml配置文件，比如机场有AI、流媒体解锁等专项节点，故本订阅节点加入了“流媒体”、“GPT”策略组，不需要的可删除，但要删干净，特别是策略组中的节点，否则报错；
# 机场节点地区分类仅分了香港、美国、新加坡、日本、韩国、加拿大和其他地区，如果你的机场某个地区节点比较多，可以参照业务分流组新增地区分类；
# 根据自己使用习惯，策略组已将默认节点策略组放置在最前，便于每次更新订阅均不需重新选择策略组节点，可根据自己的情况对策略组的顺序做相应调整；
# 在规则组中写有部分设备不代理，或部分设备指定域名走代理，其余直连的规则，根据个人情况修订或删除；
# 规则组可根据自己的使用情况自行定制rules，比如加入自己经常使用的直连和需代理的域名或IP，加在现有rules的最前面，其他最好不要改动现有顺序，否则可能会影响使用效果。



# ————————————————————————
# 端口设置
# ————————————————————————

port: 7890                     # HTTP 代理端口
socks-port: 7891               # SOCKS5 代理端口
redir-port: 7892               # Redir 透明代理端口（iptables 转发）
mixed-port: 7893               # HTTP + SOCKS 混合代理端口
tproxy-port: 7895              # TProxy 透明代理端口
allow-lan: true                # 允许局域网设备连接代理
mode: rule                     # 运行模式：规则模式
log-level: info                # 日志级别（info 信息级）
external-controller: 0.0.0.0:9090   # 外部控制 API 监听地址和端口
external-ui: ui                     # 外部 UI 文件目录
external-ui-name: zashboard         # 使用的 Web UI 名称
external-ui-url: https://gh-proxy.com/github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip  # UI 在线下载地址
secret: "123456"                    # 控制 API 访问密码

# ————————————————————————
# 机场订阅
# ————————————————————————

proxy-providers:                     # 代理订阅配置
  Airport1:                           # 机场1（自定义机场名称）
    url: "机场2订阅地址"               # 订阅下载地址1
    type: http                        # 订阅类型为 HTTP
    interval: 86400                   # 订阅更新间隔（秒）
    filter: "^((?!(建议|如果|教程|客户端|X0.1)).)*$"   # 节点名称正则过滤规则
    override:                         # 覆盖节点默认配置
      skip-cert-verify: true          # 跳过证书验证
      udp: true                       # 启用 UDP 支持
    health-check:                     # 节点健康检查设置
      enable: true                    # 启用健康检查
      url: http://www.apple.com/library/test/success.html   # 健康检查测试地址
      interval: 300                   # 健康检查间隔（秒）
    override:                         # 覆写节点配置
      skip-cert-verify: true          # 跳过证书验证
      udp: true                       # 启用UDP
      additional-prefix: "[Airport1]"  # 为节点名添加前缀
      additional-suffix: "Airport1"    # 为节点名添加后缀

  Airport2:                           # 机场2（不能重名）
    url: "机场2订阅地址"               # 订阅下载地址2
    type: http                        # 订阅类型为 HTTP
    interval: 86400                   # 订阅更新间隔（秒）
    filter: "^((?!(建议|如果|教程|客户端|X0.1)).)*$"   # 节点名称正则过滤规则
    override:                         # 覆盖节点默认配置
      skip-cert-verify: true          # 跳过证书验证
      udp: true                       # 启用 UDP 支持
    health-check:                     # 节点健康检查设置
      enable: true                    # 启用健康检查
      url: http://www.apple.com/library/test/success.html   # 健康检查测试地址
      interval: 300                   # 健康检查间隔（秒）
    override:                         # 覆写节点配置
      skip-cert-verify: true          # 跳过证书验证
      udp: true                       # 启用UDP
      additional-prefix: "[Airport2]"  # 为节点名添加前缀（自定义）
      additional-suffix: "Airport2"    # 为节点名添加后缀（自定义）

# ————————————————————————
# DNS 设置 
# ————————————————————————

dns:                                 # DNS 模块配置
  enable: true                       # 启用内置 DNS
  listen: 0.0.0.0:7874               # DNS 监听地址和端口
  ipv6: true                         # DNS 支持 IPv6 查询
  enhanced-mode: fake-ip             # 增强模式：fake-ip 模式
  fake-ip-range: 198.20.0.1/16       # fake-ip 地址池范围
  nameserver:                        # 上游 DNS 服务器
    - 223.5.5.5                      # 阿里 DNS 服务器
  fake-ip-filter:                    # fake-ip 排除列表
    - +.lan                          # 排除局域网域名
    - +.local                        # 排除本地域名
    - geosite:cn                     # 排除中国大陆域名
    - +.ifaner.dd94wan.com           # 排除指定域名
ipv6: true                           # 全局启用 IPv6

# ————————————————————————
# 运行模式
# ————————————————————————

tun:                                 # TUN 模块配置
  enable: true                       # 启用 TUN 模式
  stack: gvisor                      # 使用 gvisor 网络栈
  device: utun                       # TUN 虚拟设备名称
  endpoint-independent-nat: true     # 启用独立 NAT 映射
  auto-route: false                  # 不自动添加路由
  auto-detect-interface: false       # 不自动检测网络接口
  auto-redirect: false               # 不自动添加重定向规则
  strict-route: false                # 不启用严格路由模式
profile:                             # 配置持久化设置
  store-selected: true               # 记住策略组选择
  store-fake-ip: true                # 保存 fake-ip 映射关系

# ————————————————————————
# 数据库
# ————————————————————————

geox-url:                            # GEO 数据下载地址
  mmdb: https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/Country.mmdb   # 国家 IP 数据库地址
  geoip: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat   # GeoIP 数据文件地址
  geosite: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat # GeoSite 数据文件地址
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb        # ASN 数据库地址
geo-auto-update: true                # 启用 GEO 数据自动更新
geo-update-interval: 24              # GEO 更新间隔（小时）
geodata-mode: true                   # 启用 geodata 规则模式

# ————————————————————————
# 代理策略组
# ————————————————————————

proxy-groups:                                  # 策略组配置开始
  - name: 手动选择                              # 策略组名称：手动选择
    icon: "https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Static.png"  # 策略组显示图标地址
    type: select                               # 策略组类型：手动选择模式
    url: http://www.apple.com/library/test/success.html   # 延迟测试使用的检测地址
    interval: 300                              # 延迟测试间隔（秒）
    include-all: true                          # 自动包含所有节点
    proxies:                                   # 手动指定节点列表
      - 全部自动
      - 全球直连
      - 香港-自动
      - 美国-自动
      - 日本-自动
      - 台湾-自动
      - 新加坡-自动
      - 韩国-自动
      - 英国-自动
      - 流媒体-自动
      - GPT-自动
      - 其他-自动
    filter: "^((?!(建议|如果|教程|客户端)).)*$" # 节点名称正则过滤规则

  - name: 全部自动
    icon: "https://testingcf.jsdelivr.net/gh/Lanlan13-14/Rules@main/icon/automation2.png"
    type: url-test                           # 策略组类型：自动选择模式
    url: http://www.apple.com/library/test/success.html
    include-all: true
    tolerance: 50
    interval: 300
    filter: "^((?!(建议|如果|教程|客户端)).)*$"

