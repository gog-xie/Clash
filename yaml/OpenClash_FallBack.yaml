rule-providers:
  My_Proxy:
    type: http
    behavior: classical
    url: https://testingcf.jsdelivr.net/gh/gog-xie/clash@main/rule/My_Proxy.yaml
    interval: 28800
    format: yaml

  My_Direct:
    type: http
    behavior: classical
    url: https://testingcf.jsdelivr.net/gh/gog-xie/clash@main/rule/My_Direct.yaml
    interval: 28800
    format: yaml

  Custom_Port_Direct:
    behavior: classical  # 混合类型（包含多种规则）
    interval: 28800
    type: http
    url: "https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml"
    format: yaml

  Custom_Direct_Domain:
    behavior: domain  # 仅域名
    interval: 28800
    type: http
    url: "https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.mrs"
    format: mrs  # 二进制格式

  Custom_Direct_IP:
    behavior: ipcidr  # 仅 IP
    interval: 28800
    type: http
    url: "https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_IP.mrs"
    format: mrs  # 二进制格式

  Custom_Direct_Port:
    behavior: classical  # 混合类型（包含多种规则）
    interval: 28800
    type: http
    url: "https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_Port.yaml"
    format: yaml

  Custom_Proxy_Domain:
    behavior: domain  # 仅域名
    interval: 28800
    type: http
    url: "https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.mrs"
    format: mrs  # 二进制格式

  Custom_Proxy_IP:
    behavior: ipcidr  # 仅 IP
    interval: 28800
    type: http
    url: "https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_IP.mrs"
    format: mrs  # 二进制格式

  Steam_CDN_Domain:
    behavior: domain  # Steam CDN下载服务器（直连获得更快速度）
    interval: 28800
    type: http
    url: "https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Domain.mrs"
    format: mrs  # 二进制格式

  Steam_CDN_IP:
    behavior: ipcidr  # Steam CDN下载服务器（直连获得更快速度）
    interval: 28800
    type: http
    url: "https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_IP.mrs"
    format: mrs  # 二进制格式
